spring.application.name=blog-platform

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/blogdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Thilaga@05
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Port
server.port=8080

# Disable default Spring Security login page
spring.security.user.name=admin
spring.security.user.password=admin

# Logging
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG